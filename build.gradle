plugins {
    id 'java'
    id 'application'
}

group = 'com.fpaa'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.jfree:jfreechart:1.5.3'
}

application {
    mainClass = 'main.Main'
}

tasks.named('jar') {
    manifest {
        attributes(
            'Main-Class': 'main.Main'
        )
    }
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
    test {
        java {
            srcDirs = ['test']
        }
    }
}

tasks.named('test') {
    enabled = false
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}